<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pixel-style retro radio for Treelio FM -->
  <style>
    .bg { fill: #1a1a2e; }
    .body { fill: #2d2d44; }
    .screen { fill: #e8c547; }
    .knob { fill: #c4960c; }
    .spk { fill: #3d3d5c; }
    .ant { fill: #e8c547; }
  </style>
  <!-- Radio body -->
  <rect class="bg" width="32" height="32" rx="4"/>
  <rect class="body" x="3" y="12" width="26" height="17" rx="2"/>
  <!-- Antenna -->
  <line class="ant" x1="24" y1="12" x2="18" y2="3" stroke="#e8c547" stroke-width="2" stroke-linecap="round"/>
  <circle class="ant" cx="18" cy="3" r="1.5"/>
  <!-- Speaker grille -->
  <rect class="spk" x="5" y="14" width="8" height="13" rx="1"/>
  <line x1="5" y1="17" x2="13" y2="17" stroke="#2d2d44" stroke-width="1"/>
  <line x1="5" y1="20" x2="13" y2="20" stroke="#2d2d44" stroke-width="1"/>
  <line x1="5" y1="23" x2="13" y2="23" stroke="#2d2d44" stroke-width="1"/>
  <!-- Display screen -->
  <rect class="screen" x="15" y="14" width="12" height="5" rx="1" opacity="0.9"/>
  <!-- FM text on screen -->
  <text x="21" y="18.5" text-anchor="middle" font-family="monospace" font-size="5" font-weight="bold" fill="#1a1a2e">FM</text>
  <!-- Knobs -->
  <circle class="knob" cx="18" cy="23" r="2"/>
  <circle class="knob" cx="24" cy="23" r="2"/>
</svg>
